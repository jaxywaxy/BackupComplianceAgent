name: Validate Code

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**/*.ps1'
      - 'config/**/*.yaml'
      - 'config/**/*.yml'
      - 'infra/**/*.bicep'
      - 'infra/**/*.bicepparam'
      - '.github/workflows/validate.yml'

jobs:
  powershell-lint:
    name: PowerShell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Force -Confirm:$false

      - name: Analyze PowerShell scripts
        shell: pwsh
        run: |
          $results = @()
          Get-ChildItem -Path ./scripts -Filter '*.ps1' -Recurse | ForEach-Object {
            $analysis = Invoke-ScriptAnalyzer -Path $_.FullName -Severity Warning
            if ($analysis) {
              $results += $analysis
            }
          }

          if ($results) {
            $results | Format-Table -AutoSize
            Write-Error "PowerShell analysis found issues"
            exit 1
          }

  yaml-lint:
    name: YAML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: |
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Validate YAML files
        run: |
          yamllint -c .yamllint config/ || true
          find config -name '*.yaml' -o -name '*.yml' | while read file; do
            echo "Checking $file"
            python -c "import yaml; yaml.safe_load(open('$file'))" || exit 1
          done

  bicep-lint:
    name: Bicep Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Bicep templates
        run: |
          # Install Azure CLI
          curl -sL https://aka.ms/InstallAzureCLIDeb | bash

          # Validate each bicep file
          find infra -name '*.bicep' | while read file; do
            echo "Validating $file"
            az bicep build --file "$file" --outdir /tmp || exit 1
          done

  file-checks:
    name: File Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check file permissions
        run: |
          # PowerShell scripts should be executable
          for file in scripts/*.ps1; do
            if [ -f "$file" ] && [ ! -x "$file" ]; then
              echo "Warning: $file is not executable"
            fi
          done

      - name: Check for required files
        run: |
          required_files=(
            "README.md"
            "ARCHITECTURE.md"
            ".gitignore"
            "config/backup-rules.yaml"
            "config/vault-mapping.yaml"
            "scripts/check-backup.ps1"
            "scripts/generate-plan.ps1"
            "scripts/apply-backup.ps1"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Error: Required file missing: $file"
              exit 1
            fi
          done

      - name: Check for sensitive files
        run: |
          if git diff --cached --name-only | grep -E '\.(pem|key|pfx|env|secrets)$'; then
            echo "Error: Sensitive files detected in commit"
            exit 1
          fi

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [powershell-lint, yaml-lint, bicep-lint, file-checks]
    if: always()
    steps:
      - name: Check validation status
        run: |
          if [ "${{ needs.powershell-lint.result }}" != "success" ] || \
             [ "${{ needs.yaml-lint.result }}" != "success" ] || \
             [ "${{ needs.bicep-lint.result }}" != "success" ] || \
             [ "${{ needs.file-checks.result }}" != "success" ]; then
            echo "❌ Validation failed"
            exit 1
          fi
          echo "✅ All validations passed"
