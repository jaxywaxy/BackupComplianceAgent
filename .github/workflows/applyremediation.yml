name: Apply Backup Remediation

on:
  push:
    branches:
      - main
    paths:
      - 'output/plans/remediation.json'
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell dependencies
        shell: pwsh
        run: |
          if (-not (Get-Module -Name powershell-yaml -ListAvailable)) {
            Install-Module -Name powershell-yaml -Force -Scope CurrentUser
          }

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.SUBSCRIPTION_ID }}

      - name: Verify configuration
        shell: pwsh
        run: |
          Write-Host "=== Workflow Configuration ===" -ForegroundColor Cyan

          # Check environment variables
          $subId = "${{ vars.SUBSCRIPTION_ID }}"
          if ([string]::IsNullOrWhiteSpace($subId)) {
            Write-Host "✗ SUBSCRIPTION_ID variable not set!" -ForegroundColor Red
            Write-Host "Go to Settings > Secrets and variables > Variables"
            Write-Host "Add SUBSCRIPTION_ID with your subscription ID"
            exit 1
          }
          Write-Host "✓ SUBSCRIPTION_ID is set" -ForegroundColor Green

          # Check for plan file
          $planFile = './output/plans/remediation.json'
          if (-not (Test-Path $planFile)) {
            Write-Host "✗ No remediation plan found at $planFile" -ForegroundColor Red
            Write-Host "Please run the 'Generate Remediation Plan' workflow first."
            exit 1
          }
          Write-Host "✓ Remediation plan found" -ForegroundColor Green

          # Show plan summary
          $plan = Get-Content $planFile | ConvertFrom-Json
          $vaultCount = if ($plan.vaultDeployments) { $plan.vaultDeployments.Count } else { 0 }
          $vmCount = if ($plan.plan) { $plan.plan.Count } else { 0 }

          Write-Host ""
          Write-Host "Plan contains:"
          Write-Host "  - Vault deployments: $vaultCount"
          Write-Host "  - VM backup items: $vmCount"

      - name: Deploy missing vaults
        shell: pwsh
        run: |
          $planFile = './output/plans/remediation.json'
          if (-not (Test-Path $planFile)) {
            Write-Host "Remediation plan file not found"
            exit 0
          }

          $plan = Get-Content $planFile | ConvertFrom-Json

          if ($plan.vaultDeployments -and $plan.vaultDeployments.Count -gt 0) {
            Write-Host "Deploying $($plan.vaultDeployments.Count) vault(s)..."
            foreach ($deployment in $plan.vaultDeployments) {
              Write-Host "Deploying vault: $($deployment.vaultName) in $($deployment.vaultRG)"
              ./scripts/deploy-vault.ps1 `
                -SubscriptionId "${{ vars.SUBSCRIPTION_ID }}" `
                -ResourceGroupName $deployment.vaultRG `
                -VaultName $deployment.vaultName `
                -Location $deployment.location

              if ($LASTEXITCODE -ne 0) {
                throw "Failed to deploy vault $($deployment.vaultName)"
              }
            }
            Write-Host "✓ All vaults deployed successfully"
          } else {
            Write-Host "ℹ️  No vault deployments required"
          }

      - name: Enable backups for VMs
        shell: pwsh
        run: |
          $planFile = './output/plans/remediation.json'
          if (-not (Test-Path $planFile)) {
            Write-Host "Remediation plan file not found"
            exit 0
          }

          $plan = Get-Content $planFile | ConvertFrom-Json

          if ($plan.plan -and $plan.plan.Count -gt 0) {
            Write-Host "Enabling backups for $($plan.plan.Count) VM(s)..."
            $successCount = 0
            $failureCount = 0

            foreach ($item in $plan.plan) {
              Write-Host ""
              Write-Host "Enabling backup for $($item.vmName)..."
              try {
                ./scripts/apply-backup.ps1 `
                  -VaultName $item.vaultName `
                  -VaultRG $item.vaultRG `
                  -VmName $item.vmName `
                  -VmRG $item.resourceGroup `
                  -PolicyName $item.policyName

                if ($LASTEXITCODE -eq 0) {
                  Write-Host "✓ Backup enabled for $($item.vmName)" -ForegroundColor Green
                  $successCount++
                } else {
                  Write-Host "✗ Failed to enable backup for $($item.vmName)" -ForegroundColor Red
                  $failureCount++
                }
              } catch {
                Write-Host "✗ Error enabling backup for $($item.vmName): $_" -ForegroundColor Red
                $failureCount++
              }
            }

            Write-Host ""
            Write-Host "Summary:" -ForegroundColor Cyan
            Write-Host "  ✓ Successful: $successCount"
            Write-Host "  ✗ Failed: $failureCount"

            if ($failureCount -gt 0) {
              throw "Failed to enable backup on $failureCount VM(s)"
            }
          } else {
            Write-Host "ℹ️  No backup enablement items in plan"
          }

      - name: Publish summary
        if: always()
        shell: pwsh
        run: |
          $planFile = './output/plans/remediation.json'
          if (Test-Path $planFile) {
            $plan = Get-Content $planFile | ConvertFrom-Json
            $vaultCount = if ($plan.vaultDeployments) { $plan.vaultDeployments.Count } else { 0 }
            $vmCount = if ($plan.plan) { $plan.plan.Count } else { 0 }

            $summary = @()
            $summary += "# Backup Remediation Applied"
            $summary += ""
            $summary += "## Summary"
            $summary += "- Vaults deployed: $vaultCount"
            $summary += "- VMs backed up: $vmCount"
            $summary += ""

            $summaryFile = $env:GITHUB_STEP_SUMMARY
            if ($summaryFile) {
              $summary -join "`n" | Out-File -Encoding utf8 -FilePath $summaryFile -Append
            }
          }

      - name: Log completion
        run: echo "✓ Backup remediation applied successfully"
