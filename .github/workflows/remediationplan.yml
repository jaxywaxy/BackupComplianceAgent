name: Generate Remediation Plan

on:
  workflow_dispatch:
    inputs:
      subscriptionId:
        description: 'Azure Subscription ID'
        required: true
      resourceGroupName:
        description: 'Resource Group (optional)'
        required: false

jobs:
  plan:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ inputs.subscriptionId }}

      - name: Generate remediation plan
        shell: pwsh
        run: |
          ./scripts/generate-plan.ps1 `
            -SubscriptionId "${{ inputs.subscriptionId }}" `
            -ResourceGroupName "${{ inputs.resourceGroupName }}"

      - name: Check remediation plan
        shell: pwsh
        run: |
          $planFile = './output/plans/remediation.json'
          if (-not (Test-Path $planFile)) {
            throw "Remediation plan file not found: $planFile"
          }

          $data = Get-Content $planFile -Raw | ConvertFrom-Json
          $planCount = if ($data.plan) { $data.plan.Count } else { 0 }
          $notificationCount = if ($data.notifications) { $data.notifications.Count } else { 0 }

          Write-Host "Plan items: $planCount"
          Write-Host "Notifications: $notificationCount"

          if ($planCount -eq 0 -and $notificationCount -eq 0) {
            Write-Host "No remediation items and no notifications were generated. Skipping PR creation."
            exit 0
          }

      - name: Commit plan
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout -b remediation-plan-${{ github.run_id }}
          git add output/plans/remediation.json
          git commit -m "Generated backup remediation plan"
          if ($LASTEXITCODE -ne 0) {
            throw "Commit failed: no remediation plan changes were staged."
          }
          git push origin HEAD
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to push remediation plan branch to origin."
          }

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          title: "Backup remediation plan"
          body: |
            This PR contains a backup remediation plan.

            ✅ Review required
            ✅ No changes have been applied yet

            Merge this PR to approve remediation.
          branch: remediation-plan-${{ github.run_id }}
          base: main
