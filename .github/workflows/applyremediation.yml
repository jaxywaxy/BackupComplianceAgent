name: Apply Backup Remediation

on:
  push:
    branches:
      - main

jobs:
  apply:
    runs-on: ubuntu-latest

    if: contains(github.event.head_commit.message, 'Generated backup remediation plan')

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.SUBSCRIPTION_ID }}

      - name: Deploy missing vaults
        shell: pwsh
        run: |
          $plan = Get-Content ./output/plans/remediation.json | ConvertFrom-Json

          if ($plan.vaultDeployments -and $plan.vaultDeployments.Count -gt 0) {
            Write-Host "Deploying $($plan.vaultDeployments.Count) vault(s)..."
            foreach ($deployment in $plan.vaultDeployments) {
              Write-Host "Deploying vault: $($deployment.vaultName) in $($deployment.vaultRG)"
              ./scripts/deploy-vault.ps1 `
                -SubscriptionId "${{ vars.SUBSCRIPTION_ID }}" `
                -ResourceGroupName $deployment.vaultRG `
                -VaultName $deployment.vaultName `
                -Location $deployment.location
            }
          } else {
            Write-Host "No vault deployments required."
          }

      - name: Enable backups for VMs
        shell: pwsh
        run: |
          $plan = Get-Content ./output/plans/remediation.json | ConvertFrom-Json

          if ($plan.plan -and $plan.plan.Count -gt 0) {
            Write-Host "Enabling backups for $($plan.plan.Count) VM(s)..."
            foreach ($item in $plan.plan) {
              Write-Host "Enabling backup for $($item.vmName)..."
              ./scripts/apply-backup.ps1 `
                -VaultName $item.vaultName `
                -VaultRG $item.vaultRG `
                -VmName $item.vmName `
                -VmRG $item.resourceGroup `
                -PolicyName $item.policyName
            }
          } else {
            Write-Host "No backup enablement items in plan."
          }

      - name: Log completion
        run: echo "Backup remediation applied successfully"
